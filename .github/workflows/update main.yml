name: CI/CD Pipeline
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON is valid
        run: |
          python -c "
          import json
          with open('customer tickets 1.json') as f:
            data = json.load(f)
          print('✅ JSON is valid!')
          print(f'Total records: {len(data)}')
          "

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "✅ JSON validated and deployed!"
