name: CI/CD Pipeline

on: [push]  # Triggers on every push to repository

jobs:

  # ─────────────── CI: TEST ───────────────
  test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python -m pytest tests/ -v

  # ─────────────── CD: DEPLOY ───────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test  # ✅ Only runs if test passes
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy
        run: |
          echo "✅ All tests passed! Starting deployment..."
          python bccbeb79-2e3f-437d-a53b-c097b41fea03

      - name: Notify Success
        if: success()
        run: echo "🚀 Deployment Successful!"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment Failed! Check logs above."
